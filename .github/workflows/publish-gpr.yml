name: Publish to GitHub Packages

# Publishes @purityjs/* packages to the GitHub Packages npm registry
# (https://npm.pkg.github.com) on every released GitHub Release.
#
# Authentication uses the workflow's built-in GITHUB_TOKEN — no PAT required.
# See: https://docs.github.com/en/packages/managing-github-packages-using-github-actions-workflows/publishing-and-installing-a-package-with-github-actions
#
# NOTE: GitHub Packages npm registry requires the package scope to match the
# repository owner (case-insensitive). The owner here is `KoalaFacts`, so
# either:
#   1) rename the packages from `@purityjs/*` to `@koalafacts/*`, or
#   2) move the repo under a `purityjs` GitHub organization.
# Until one of those is done, `npm publish` against npm.pkg.github.com will
# fail with a 403 / scope mismatch.

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build → Publish to GitHub Packages
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 🟢 Setup Node.js 24
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build @purityjs/core
        run: npm run build -w packages/core

      - name: 🏗️ Build @purityjs/vite-plugin
        run: npm run build -w packages/vite-plugin

      - name: 🏗️ Build @purityjs/cli
        run: npm run build -w packages/cli

      - name: 🚀 Publish @purityjs/core
        run: npm publish -w packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Publish @purityjs/vite-plugin
        run: npm publish -w packages/vite-plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Publish @purityjs/cli
        run: npm publish -w packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
