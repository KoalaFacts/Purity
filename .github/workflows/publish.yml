name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Explicit version to publish (e.g. 0.1.0, 0.2.0)'
        required: true
        default: '0.1.0'

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: npm ci

      # Full CI checks before publish
      - name: Format check (Oxfmt — Vite+)
        run: npx oxfmt --check .

      - name: Lint (Oxlint — Vite+)
        run: npx oxlint

      - name: Type-check
        run: npx tsc --noEmit -p packages/core

      - name: Test core
        run: npm test -w packages/core

      - name: Test vite-plugin
        run: npm test -w packages/vite-plugin

      # Build in dependency order
      - name: Build core
        run: npm run build -w packages/core

      - name: Build vite-plugin
        run: npm run build -w packages/vite-plugin

      - name: Build cli
        run: npm run build -w packages/cli

      # Publish in dependency order
      # First publish: set NPM_TOKEN as environment secret on 'production'
      # After trusted publishing is configured: remove all NODE_AUTH_TOKEN env lines
      - name: Publish core
        run: npm publish -w packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish vite-plugin
        run: npm publish -w packages/vite-plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cli
        run: npm publish -w packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Tag the release
      - name: Create git tag
        run: |
          git tag v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}
