<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vue – Filtered Search</title>
  <link href="/css/currentStyle.css" rel="stylesheet" />
</head>
<body>
  <div id="main"><div class="container">
    <div class="jumbotron"><div class="row">
      <div class="col-md-6"><h1>Vue (Filter)</h1></div>
      <div class="col-md-6"><div class="row">
        <div class="col-sm-6 smallpad"><input type="text" id="search" placeholder="Search..." class="form-control" /></div>
        <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="populate">Populate 10k</button></div>
        <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="clear-search">Clear Search</button></div>
        <button type="button" id="populate-1k" style="display:none">Populate 1000</button>
        <button type="button" id="populate-10" style="display:none">Populate 10</button>
        <button type="button" id="populate-100" style="display:none">Populate 100</button>
      </div></div>
    </div></div>
    <table class="table table-hover table-striped test-data"><tbody id="tbody"></tbody></table>
  </div></div>
  <script type="module">
    import { createFilterApp } from './filter.ts';

    createFilterApp(
      document.getElementById('tbody'),
      document.getElementById('search'),
      document.getElementById('populate'),
      document.getElementById('clear-search'),
      document.getElementById('populate-1k'),
      document.getElementById('populate-10'),
      document.getElementById('populate-100'),
    );
  </script>
</body>
</html>
