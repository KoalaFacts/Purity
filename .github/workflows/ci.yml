name: CI — Check, Test, Build

# Runs automatically on every push to main and every PR.
# Verifies code quality, type safety, tests, and build integrity.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Check → Test → Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: 🟢 Setup Node.js 24
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Install root dependencies
        # Installs all workspace dependencies from lockfile
        run: npm ci

      - name: 🔐 Audit dependencies
        run: npm audit --audit-level=high

      - name: 🔐 Verify package provenance (non-blocking)
        # npm attestation API can be flaky; log results but don't gate CI
        run: npm audit signatures || true

      - name: 🔍 Format check (Oxfmt — Vite+)
        # Verifies all files are formatted; no modifications
        run: npx oxfmt --check .

      - name: 🔍 Lint (Oxlint — Vite+)
        # Runs oxlint with rules from .oxlintrc.json
        run: npx oxlint

      - name: 🔷 Type check @purityjs/core
        # Verifies TypeScript types compile without errors
        run: cd packages/core && npx tsc --noEmit

      - name: 🧪 Test @purityjs/core (155 tests)
        # Runs vitest on the core framework — signals, templates, components, control flow
        run: npm test -w packages/core

      - name: 🧪 Test @purityjs/vite-plugin (12 tests)
        # Runs vitest on the AOT template compiler plugin
        run: npm test -w packages/vite-plugin

      - name: 🏗️ Build @purityjs/core
        # Produces dist/ with ESM, CJS, and .d.ts type declarations
        run: npm run build -w packages/core

      - name: 🏗️ Build @purityjs/vite-plugin
        # Produces dist/ with the compiled plugin
        run: npm run build -w packages/vite-plugin

      - name: 🏗️ Build benchmark (verifies AOT compilation)
        # Runs vite build — proves the AOT plugin compiles html`` templates.
        # Benchmark is a workspace member so deps are already installed.
        run: cd benchmark && npx vite build

      - name: 🏗️ Build dashboard demo (smoke check)
        # Builds the live demo so regressions in examples/dashboard don't
        # land on main and surface only at next benchmark deploy.
        run: npm run build -w examples/dashboard
