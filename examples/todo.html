<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purity — Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      background: #f0f1f3;
      color: #212529;
      padding: 2rem 1rem;
    }
    .app {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
    }
    h1 { font-size: 1.5rem; color: #6c5ce7; margin-bottom: 0.25rem; }
    .subtitle { font-size: 0.85rem; color: #868e96; margin-bottom: 1.5rem; }
    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    input[type="text"] {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: 2px solid #dee2e6;
      border-radius: 8px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus { border-color: #6c5ce7; }
    button {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      background: #6c5ce7;
      color: white;
      transition: background 0.15s;
      white-space: nowrap;
    }
    button:hover { background: #5a4bd1; }
    button:disabled { background: #ced4da; cursor: not-allowed; }
    .filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .filters button {
      padding: 0.35rem 0.8rem;
      font-size: 0.8rem;
      background: #e9ecef;
      color: #495057;
    }
    .filters button:hover { background: #dee2e6; }
    .filters button.active { background: #6c5ce7; color: white; }
    .todo-list { list-style: none; }
    .todo-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 0;
      border-bottom: 1px solid #f1f3f5;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #6c5ce7;
      cursor: pointer;
      flex-shrink: 0;
    }
    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      transition: opacity 0.2s;
    }
    .todo-text.done {
      text-decoration: line-through;
      opacity: 0.45;
    }
    .delete-btn {
      background: none;
      color: #e17055;
      font-size: 1.1rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }
    .delete-btn:hover { background: #fff5f5; }
    .empty {
      text-align: center;
      color: #adb5bd;
      padding: 2rem 0;
      font-size: 0.9rem;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid #f1f3f5;
      font-size: 0.8rem;
      color: #868e96;
    }
    .clear-btn {
      background: none;
      color: #e17055;
      font-size: 0.8rem;
      padding: 0.2rem 0.5rem;
    }
    .clear-btn:hover { background: #fff5f5; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script type="module">
    import {
      state, compute, watch,
      html, mount, match, each,
      onMount, onDestroy,
    } from '../src/index.ts';

    function TodoApp() {
      // --- State ---
      const todos = state([]);
      const inputText = state('');
      const filter = state('all'); // 'all' | 'active' | 'done'
      let nextId = 1;

      // --- Derived ---
      const filteredTodos = compute(() => {
        const f = filter();
        const list = todos();
        if (f === 'active') return list.filter(t => !t.done);
        if (f === 'done') return list.filter(t => t.done);
        return list;
      });

      const remaining = compute(() =>
        todos().filter(t => !t.done).length
      );

      const hasDone = compute(() =>
        todos().some(t => t.done)
      );

      // --- Actions ---
      const addTodo = () => {
        const text = inputText().trim();
        if (!text) return;
        todos([...todos(), { id: nextId++, text, done: false }]);
        inputText('');
      };

      const toggleTodo = (id) => {
        todos(todos().map(t =>
          t.id === id ? { ...t, done: !t.done } : t
        ));
      };

      const deleteTodo = (id) => {
        todos(todos().filter(t => t.id !== id));
      };

      const clearDone = () => {
        todos(todos().filter(t => !t.done));
      };

      const handleKeydown = (e) => {
        if (e.key === 'Enter') addTodo();
      };

      const handleInput = (e) => {
        inputText(e.target.value);
      };

      const setFilter = (f) => () => filter(f);

      // --- Lifecycle ---
      onMount(() => {
        console.log('Todo app mounted');
        const saved = localStorage.getItem('purity-todos');
        if (saved) {
          try {
            const parsed = JSON.parse(saved);
            todos(parsed);
            nextId = parsed.reduce((max, t) => Math.max(max, t.id + 1), 1);
          } catch {}
        }
      });

      watch(() => {
        const list = todos();
        localStorage.setItem('purity-todos', JSON.stringify(list));
      });

      // --- View ---
      return html`
        <div class="app">
          <h1>Purity Todo</h1>
          <p class="subtitle">A demo of the Purity framework</p>

          <div class="input-row">
            <input
              type="text"
              placeholder="What needs to be done?"
              .value=${() => inputText()}
              @input=${handleInput}
              @keydown=${handleKeydown}
            />
            <button @click=${addTodo} ?disabled=${() => !inputText().trim()}>
              Add
            </button>
          </div>

          <div class="filters">
            <button
              class=${() => filter() === 'all' ? 'active' : ''}
              @click=${setFilter('all')}
            >All</button>
            <button
              class=${() => filter() === 'active' ? 'active' : ''}
              @click=${setFilter('active')}
            >Active</button>
            <button
              class=${() => filter() === 'done' ? 'active' : ''}
              @click=${setFilter('done')}
            >Done</button>
          </div>

          ${match(() => filteredTodos().length === 0, {
            true:  () => html`<p class="empty">No todos here yet.</p>`,
            false: () => html`
              <ul class="todo-list">
                ${each(
                  filteredTodos,
                  (todo) => html`
                    <li class="todo-item">
                      <input
                        type="checkbox"
                        .checked=${todo.done}
                        @change=${() => toggleTodo(todo.id)}
                      />
                      <span class=${todo.done ? 'todo-text done' : 'todo-text'}>
                        ${todo.text}
                      </span>
                      <button class="delete-btn" @click=${() => deleteTodo(todo.id)}>
                        &times;
                      </button>
                    </li>
                  `,
                  (todo) => todo.id
                )}
              </ul>
            `,
          })}

          <div class="footer">
            <span>${() => remaining()} item${() => remaining() === 1 ? '' : 's'} left</span>
            ${match(() => hasDone(), {
              true: () => html`<button class="clear-btn" @click=${clearDone}>Clear done</button>`,
            })}
          </div>
        </div>
      `;
    }

    mount(TodoApp, document.getElementById('app'));
  </script>
</body>
</html>
