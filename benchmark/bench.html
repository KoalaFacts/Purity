<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purity Benchmark Suite</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;padding:1.5rem;background:#f5f5f5;max-width:1400px;margin:0 auto}
    h1{color:#6c5ce7;margin-bottom:.25rem}
    .sub{color:#888;margin-bottom:1.5rem;font-size:.85rem}
    button{padding:.6rem 1.2rem;border:none;border-radius:6px;background:#6c5ce7;color:white;cursor:pointer;font-size:1rem;margin-bottom:1rem;margin-right:.5rem}
    button:hover{background:#5a4bd1}
    button:disabled{background:#ccc;cursor:not-allowed}
    #status{background:white;border-radius:8px;padding:1rem;margin-bottom:1rem;font-family:monospace;font-size:.85rem;white-space:pre-wrap;line-height:1.5;min-height:100px}
    table.results{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;margin-bottom:1rem}
    table.results th{background:#6c5ce7;color:white;padding:.6rem;text-align:left;font-size:.85rem}
    table.results td{padding:.5rem .6rem;border-bottom:1px solid #eee;font-size:.85rem;font-family:monospace}
    .good{color:#27ae60;font-weight:bold}
    .ok{color:#f39c12}
    .slow{color:#e74c3c}
    .overhead{font-size:.75rem;color:#888}
    table.bench-data{width:100%;border-collapse:collapse;display:none}
    table.bench-data td{padding:.2rem .4rem;border-bottom:1px solid #eee;font-size:.8rem}
    tr.danger td{background:#ffe0d6}
  </style>
</head>
<body>
  <h1>Purity Benchmark Suite</h1>
  <p class="sub">Purity vs Vanilla JS — measures exact framework overhead. Warmup: 3 | Iterations: 10 | Discard worst: 2.</p>

  <button type="button" id="run-btn">Run Full Comparison</button>

  <div id="status">Ready. Click to compare Purity (state+watch+each) vs Vanilla JS (raw DOM).</div>

  <table class="results" id="results-table" style="display:none">
    <thead><tr>
      <th>Operation</th>
      <th>Purity (median)</th>
      <th>Vanilla (median)</th>
      <th>Overhead</th>
    </tr></thead>
    <tbody id="results-body"></tbody>
  </table>

  <table class="bench-data"><tbody id="tbody-purity"></tbody></table>
  <table class="bench-data"><tbody id="tbody-vanilla"></tbody></table>

  <script type="module">
    import { createApp } from './src/app.ts';
    import { createVanillaApp } from './src/vanilla.ts';
    import { benchmarkOp, formatStats, flush, sleep } from './src/runner.ts';

    const purityApp = createApp(document.getElementById('tbody-purity'));
    const vanillaApp = createVanillaApp(document.getElementById('tbody-vanilla'));

    const statusEl = document.getElementById('status');
    const resultsTable = document.getElementById('results-table');
    const resultsBody = document.getElementById('results-body');
    const runBtn = document.getElementById('run-btn');

    function log(msg) { statusEl.textContent += msg + '\n'; }

    function addResult(name, purity, vanilla) {
      const tr = document.createElement('tr');
      const overhead = purity.median > 0 && vanilla.median > 0
        ? ((purity.median / vanilla.median - 1) * 100).toFixed(0)
        : '—';
      const overheadClass = Number(overhead) < 20 ? 'good' : Number(overhead) < 100 ? 'ok' : 'slow';
      tr.innerHTML = `
        <td>${name}</td>
        <td>${purity.median.toFixed(1)}ms</td>
        <td>${vanilla.median.toFixed(1)}ms</td>
        <td class="${overheadClass}">${overhead === '—' ? '—' : (Number(overhead) > 0 ? `+${overhead}%` : `${overhead}%`)}</td>
      `;
      resultsBody.appendChild(tr);
    }

    function makeSuite(app) {
      const clear = () => app.clear();
      const create1k = () => { app.clear(); app.run(1000); };

      return [
        ['Create 1,000 rows',     clear, () => app.run(1000), null],
        ['Replace 1,000 rows',    create1k, () => app.run(1000), null],
        ['Update every 10th row', create1k, () => app.update(), clear],
        ['Select row',            create1k, () => { const d = app.getData(); if (d.length) app.select(d[Math.floor(d.length/2)].id); }, clear],
        ['Swap rows',             create1k, () => app.swapRows(), clear],
        ['Remove row',            create1k, () => { const d = app.getData(); if (d.length) app.remove(d[0].id); }, clear],
        ['Clear 1,000 rows',      create1k, () => app.clear(), null],
        ['Create 10,000 rows',    clear, () => app.run(10000), null],
        ['Clear 10,000 rows',     null, () => app.clear(), null],
        ['Append 1,000 rows',     create1k, () => app.add(), clear],
      ];
    }

    async function runFullSuite() {
      runBtn.disabled = true;
      statusEl.textContent = '';
      resultsBody.innerHTML = '';
      resultsTable.style.display = 'table';

      log('Purity vs Vanilla JS — Framework Overhead Comparison\n');

      const puritySuite = makeSuite(purityApp);
      const vanillaSuite = makeSuite(vanillaApp);
      const results = [];

      for (let i = 0; i < puritySuite.length; i++) {
        const [name] = puritySuite[i];
        log(`Running: ${name}...`);

        // Run vanilla first (no microtask overhead)
        const [, vs, vr, vt] = vanillaSuite[i];
        const vanilla = await benchmarkOp(`vanilla: ${name}`, vs, vr, vt);

        // Then Purity
        const [, ps, pr, pt] = puritySuite[i];
        const purity = await benchmarkOp(`purity: ${name}`, ps, pr, pt);

        log(`  Purity:  ${formatStats(purity.stats)}`);
        log(`  Vanilla: ${formatStats(vanilla.stats)}`);
        const oh = ((purity.stats.median / vanilla.stats.median - 1) * 100).toFixed(0);
        log(`  Overhead: ${Number(oh) > 0 ? '+' : ''}${oh}%\n`);

        addResult(name, purity.stats, vanilla.stats);
        results.push({ name, purity: purity.stats, vanilla: vanilla.stats });
      }

      log('✓ Done. Purity = state() + watch() + each(). Vanilla = raw DOM.');

      // Headless mode
      window.__benchResults = results;
      const marker = document.createElement('div');
      marker.id = 'bench-complete';
      marker.textContent = 'BENCHMARK_COMPLETE';
      document.body.appendChild(marker);

      runBtn.disabled = false;
    }

    runBtn.addEventListener('click', runFullSuite);

    if (location.search.includes('auto')) {
      runFullSuite();
    }
  </script>
</body>
</html>
