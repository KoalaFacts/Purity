<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Purity Live Dashboard</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f8;
        --fg: #111;
        --muted: #6b7280;
        --card: #fff;
        --border: #e5e7eb;
        --accent: #2563eb;
        --ok: #16a34a;
        --warn: #d97706;
        --err: #dc2626;
        --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
      }
      [data-theme='dark'] {
        --bg: #0b0d10;
        --fg: #e5e7eb;
        --muted: #9ca3af;
        --card: #15181c;
        --border: #2a2f36;
        --accent: #60a5fa;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font:
          14px/1.4 system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        background: var(--bg);
        color: var(--fg);
        min-height: 100vh;
      }
      a {
        color: var(--accent);
      }
      header.top {
        display: flex;
        align-items: center;
        gap: 1rem;
        padding: 0.75rem 1.25rem;
        border-bottom: 1px solid var(--border);
        background: var(--card);
      }
      header.top h1 {
        font-size: 1rem;
        margin: 0;
        font-weight: 600;
      }
      header.top .grow {
        flex: 1;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
        background: color-mix(in srgb, var(--accent) 12%, transparent);
        color: var(--accent);
        font-size: 0.78rem;
      }
      .pill .dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: var(--accent);
      }
      .pill.ok .dot {
        background: var(--ok);
      }
      .pill.ok {
        background: color-mix(in srgb, var(--ok) 12%, transparent);
        color: var(--ok);
      }
      .pill.err .dot {
        background: var(--err);
      }
      .pill.err {
        background: color-mix(in srgb, var(--err) 12%, transparent);
        color: var(--err);
      }
      button {
        padding: 0.4rem 0.8rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--fg);
        cursor: pointer;
        font: inherit;
      }
      button:hover {
        border-color: var(--accent);
      }
      button[disabled] {
        opacity: 0.5;
        cursor: not-allowed;
      }
      input[type='text'] {
        padding: 0.4rem 0.6rem;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--fg);
        font: inherit;
        width: 100%;
      }
      input[type='checkbox'] {
        accent-color: var(--accent);
      }
      label {
        cursor: pointer;
        user-select: none;
      }
      main {
        max-width: 1100px;
        margin: 0 auto;
        padding: 1.25rem;
        display: grid;
        gap: 1.25rem;
      }
      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 0.75rem;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 1rem;
      }
      .stat .label {
        color: var(--muted);
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .stat .value {
        font: 600 1.6rem/1.1 var(--mono);
        margin-top: 0.3rem;
      }
      .stat .delta {
        margin-top: 0.4rem;
        color: var(--muted);
        font-size: 0.8rem;
      }
      .controls {
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
        align-items: center;
      }
      .controls .grow {
        flex: 1;
        min-width: 200px;
      }
      .events {
        list-style: none;
        margin: 0;
        padding: 0;
        max-height: 340px;
        overflow: auto;
      }
      .events li {
        padding: 0.55rem 0.75rem;
        border-bottom: 1px solid var(--border);
        display: grid;
        grid-template-columns: 80px 80px 1fr;
        gap: 0.75rem;
        align-items: baseline;
      }
      .events li:last-child {
        border-bottom: 0;
      }
      .events .time {
        color: var(--muted);
        font: 0.78rem var(--mono);
      }
      .events .level {
        font: 0.72rem var(--mono);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .events .level.info {
        color: var(--muted);
      }
      .events .level.warn {
        color: var(--warn);
      }
      .events .level.error {
        color: var(--err);
      }
      .empty {
        color: var(--muted);
        padding: 1.5rem;
        text-align: center;
      }
      .footer {
        color: var(--muted);
        font-size: 0.78rem;
        text-align: center;
        padding: 1rem;
      }
      .spark {
        display: block;
        width: 100%;
        height: 60px;
        margin-top: 0.6rem;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
