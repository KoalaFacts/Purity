<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Solid – Recursive Tree</title>
  <link href="/css/currentStyle.css" rel="stylesheet" />
</head>
<body>
  <div id="main"><div class="container">

      <div class="col-md-6"><h1>Solid (Tree)</h1></div>
      <div class="col-md-6"><div class="row">

        <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="collapse-all">Collapse All</button></div>
        <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="toggle-first">Toggle First</button></div>
      </div></div>
    </div></div>

    import { createTreeApp } from './tree.tsx';

    createTreeApp(
      document.getElementById('container'),
      document.getElementById('expand-all'),
      document.getElementById('collapse-all'),
      document.getElementById('toggle-first'),
    );
  </script>
</body>
</html>
