name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Explicit version to publish (e.g. 0.1.0, 0.2.0)"
        required: true
        default: "0.1.0"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: voidzero-dev/setup-vp@237a7eda494c3466dcb53e9f067142b9218d64a1 # v1
        with:
          node-version: 24
          cache: true

      # Full CI checks before publish
      - name: Check
        run: vp check

      - name: Type-check
        run: vp exec tsc --noEmit -p packages/core

      - name: Test core
        run: vp run --filter @purityjs/core test

      - name: Test vite-plugin
        run: vp run --filter @purityjs/vite-plugin test

      # Build in dependency order
      - name: Build core
        run: vp run --filter @purityjs/core build

      - name: Build vite-plugin
        run: vp run --filter @purityjs/vite-plugin build

      - name: Build cli
        run: vp run --filter @purityjs/cli build

      # Publish in dependency order
      # First publish: set NPM_TOKEN as environment secret on 'production'
      # After trusted publishing is configured: remove all NODE_AUTH_TOKEN env lines
      - name: Publish core
        run: npm publish -w packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish vite-plugin
        run: npm publish -w packages/vite-plugin
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish cli
        run: npm publish -w packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Tag the release
      - name: Create git tag
        run: |
          git tag v${{ github.event.inputs.version }}
          git push origin v${{ github.event.inputs.version }}
