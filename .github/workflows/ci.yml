name: CI — Check, Test, Build

# Runs automatically on every push to main and every PR.
# Verifies code quality, type safety, tests, and build integrity.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Check → Test → Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Vite+
        uses: voidzero-dev/setup-vp@237a7eda494c3466dcb53e9f067142b9218d64a1 # v1
        with:
          node-version: "24"
          cache: true

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Verify package provenance (non-blocking)
        # npm attestation API can be flaky; log results but don't gate CI
        run: npm audit signatures || true

      - name: Check formatting, lint, and types
        run: vp check

      - name: Type check @purityjs/core
        # Verifies TypeScript types compile without errors
        run: cd packages/core && vp exec tsc --noEmit

      - name: Test @purityjs/core
        # Runs vitest on the core framework — signals, templates, components, control flow
        run: vp run --filter @purityjs/core test

      - name: Test @purityjs/vite-plugin
        # Runs vitest on the AOT template compiler plugin
        run: vp run --filter @purityjs/vite-plugin test

      - name: Build @purityjs/core
        # Produces dist/ with ESM, CJS, and .d.ts type declarations
        run: vp run --filter @purityjs/core build

      - name: Build @purityjs/vite-plugin
        # Produces dist/ with the compiled plugin
        run: vp run --filter @purityjs/vite-plugin build

      - name: Build benchmark
        # Runs vite build — proves the AOT plugin compiles html`` templates.
        # Benchmark is a workspace member so deps are already installed.
        run: cd benchmark && vp build
