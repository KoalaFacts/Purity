name: Benchmark

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Number of iterations per operation'
        required: false
        default: '10'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install benchmark dependencies
        run: cd benchmark && npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Build benchmark (AOT compile Purity templates)
        run: cd benchmark && npx vite build

      - name: Start preview server
        run: cd benchmark && npx vite preview --port 4173 &

      - name: Wait for server
        run: sleep 3

      - name: Run benchmark (headless Chromium)
        run: |
          cd benchmark
          node --import tsx run-bench.ts | tee benchmark-results.txt

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ github.run_number }}
          path: benchmark/benchmark-results.txt
          retention-days: 365

      - name: Save results to repo (benchmark-history)
        run: |
          mkdir -p benchmark/history
          cp benchmark/benchmark-results.txt "benchmark/history/$(date +%Y-%m-%d-%H%M%S).txt"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmark/history/
          git commit -m "bench: record results $(date +%Y-%m-%d)" || true
          git push || true

      - name: Create GitHub Issue with results
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('benchmark/benchmark-results.txt', 'utf8');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Benchmark Results — ${new Date().toISOString().split('T')[0]}`,
              body: [
                '## Benchmark Results',
                '',
                '```',
                results,
                '```',
                '',
                `**Run:** ${runUrl}`,
                `**Branch:** \`${context.ref}\``,
                `**Commit:** \`${context.sha.slice(0, 8)}\``,
              ].join('\n'),
              labels: ['benchmark'],
            });
