<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purity Benchmark — Real Framework Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; padding: 1rem; background: #f5f5f5; }
    h1 { color: #6c5ce7; margin-bottom: 0.25rem; }
    .subtitle { color: #888; margin-bottom: 1rem; font-size: 0.9rem; }
    .controls { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    button { padding: 0.5rem 1rem; border: none; border-radius: 6px; background: #6c5ce7; color: white; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #5a4bd1; }
    button.danger { background: #e17055; }
    #results { background: white; border-radius: 8px; padding: 1rem; margin-bottom: 1rem; font-family: monospace; white-space: pre-wrap; line-height: 1.6; min-height: 200px; }
    table { width: 100%; border-collapse: collapse; background: white; }
    td { padding: 0.3rem 0.6rem; border-bottom: 1px solid #eee; font-size: 0.85rem; }
    tr.danger td { background: #ffe0d6; }
    .remove { cursor: pointer; color: #e17055; }
    .lbl { cursor: pointer; color: #333; text-decoration: none; }
  </style>
</head>
<body>
  <h1>Purity Benchmark</h1>
  <p class="subtitle">Tests actual Purity framework APIs (state, watch, batch) — not vanilla DOM</p>

  <div class="controls">
    <button onclick="benchOp('create 1k', () => run(1000))">Create 1,000</button>
    <button onclick="benchOp('create 10k', () => run(10000))">Create 10,000</button>
    <button onclick="benchOp('append 1k', add)">Append 1,000</button>
    <button onclick="benchOp('update 10th', update)">Update 10th</button>
    <button onclick="benchOp('swap', swapRows)">Swap</button>
    <button onclick="benchOp('clear', clearAll)" class="danger">Clear</button>
    <button onclick="runAll()">Run All</button>
  </div>

  <div id="results">Click "Run All" to benchmark all operations using Purity's signal system.</div>

  <table><tbody id="tbody"></tbody></table>

  <script type="module">
    // Import from Purity core source
    import { state, watch, batch } from '../../packages/core/src/index.ts';

    // === Data ===
    const adj = ['pretty','large','big','small','tall','short','long','handsome','plain','quaint','clean','elegant','easy','angry','crazy','helpful','mushy','odd','unsightly','adorable','important','inexpensive','cheap','expensive','fancy'];
    const col = ['red','yellow','blue','green','pink','brown','purple','brown','white','black','orange'];
    const nou = ['table','chair','house','bbq','desk','car','pony','cookie','sandwich','burger','pizza','mouse','keyboard'];
    let nid = 1;
    const rnd = (m) => (Math.random()*m)|0;
    const mkData = (n) => { const d=[]; for(let i=0;i<n;i++) d.push({id:nid++,label:`${adj[rnd(adj.length)]} ${col[rnd(col.length)]} ${nou[rnd(nou.length)]}`}); return d; };

    // === Purity Signals ===
    const data = state([]);
    const sel = state(0);

    // === Actions (all through Purity state) ===
    window.run = (n) => { data(mkData(n)); sel(0); };
    window.add = () => data(d => [...d, ...mkData(1000)]);
    window.update = () => data(d => {
      const c = d.slice();
      for(let i=0;i<c.length;i+=10) c[i]={...c[i],label:c[i].label+' !!!'};
      return c;
    });
    window.clearAll = () => { data([]); sel(0); };
    window.swapRows = () => data(d => {
      if(d.length>998){ const c=d.slice(); const t=c[1]; c[1]=c[998]; c[998]=t; return c; }
      return d;
    });

    // === Render via Purity watch ===
    const tbody = document.getElementById('tbody');
    let rows = new Map();

    watch(() => {
      const items = data();
      const s = sel();
      const newMap = new Map();
      const ids = new Set();

      for(let i=0;i<items.length;i++){
        const it = items[i];
        ids.add(it.id);
        if(rows.has(it.id)){
          const r = rows.get(it.id);
          if(r.l !== it.label){ r.ln.data = it.label; r.l = it.label; }
          r.tr.className = it.id===s?'danger':'';
          newMap.set(it.id, r);
        } else {
          const tr=document.createElement('tr'); tr.id=it.id; tr.className=it.id===s?'danger':'';
          const t1=document.createElement('td'); t1.textContent=it.id;
          const t2=document.createElement('td'); const a=document.createElement('a'); a.className='lbl';
          const ln=document.createTextNode(it.label); a.appendChild(ln); t2.appendChild(a);
          const t3=document.createElement('td'); const a2=document.createElement('a'); a2.className='remove';
          a2.textContent='x'; t3.appendChild(a2);
          const t4=document.createElement('td');
          tr.appendChild(t1);tr.appendChild(t2);tr.appendChild(t3);tr.appendChild(t4);
          newMap.set(it.id, {tr,ln,l:it.label});
        }
      }
      for(const [id,r] of rows) if(!ids.has(id)&&r.tr.parentNode) r.tr.parentNode.removeChild(r.tr);
      const f=document.createDocumentFragment();
      for(let i=0;i<items.length;i++) f.appendChild(newMap.get(items[i].id).tr);
      while(tbody.firstChild) tbody.removeChild(tbody.firstChild);
      tbody.appendChild(f);
      rows = newMap;
    });

    // === Events ===
    tbody.addEventListener('click', (e) => {
      const a = e.target.closest('a'); if(!a) return; e.preventDefault();
      const id = +a.closest('tr').id;
      if(a.classList.contains('lbl')) sel(id);
      else if(a.classList.contains('remove')) data(d => d.filter(x => x.id !== id));
    });

    // === Bench harness ===
    const res = document.getElementById('results');
    window.benchOp = (name, fn) => {
      document.body.offsetHeight;
      const s = performance.now(); fn(); document.body.offsetHeight;
      const e = performance.now()-s;
      res.textContent += `${name}: ${e.toFixed(2)}ms\n`;
    };
    const sleep = (ms) => new Promise(r=>setTimeout(r,ms));
    window.runAll = async () => {
      res.textContent = 'Running (uses Purity state/watch)...\n\n';
      benchOp('create 1,000', ()=>run(1000)); await sleep(100);
      benchOp('update every 10th', update); await sleep(100);
      benchOp('swap rows', swapRows); await sleep(100);
      benchOp('select row', ()=>sel(data()[0]?.id||1)); await sleep(100);
      benchOp('delete row', ()=>data(d=>d.filter((_,i)=>i!==0))); await sleep(100);
      benchOp('clear', clearAll); await sleep(100);
      benchOp('create 10,000', ()=>run(10000)); await sleep(100);
      benchOp('clear 10,000', clearAll); await sleep(100);
      run(1000); await sleep(100);
      benchOp('append 1,000', add); await sleep(100);
      benchOp('clear all', clearAll);
      res.textContent += '\nDone! All operations used Purity state() + watch().\n';
    };
  </script>
</body>
</html>
