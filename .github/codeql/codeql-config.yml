# CodeQL config for the Purity repo. Used by the GitHub default setup
# scan (and any future custom workflow that points at this file).
#
# We override the default JS/TS query suite to drop two queries that
# have audited safe usages in this codebase:
#
#   - js/code-injection: every flagged callsite generates JS source
#     where ALL spliced values pass through `JSON.stringify` (manifest
#     codegen) or have been validated by `assertSafeName` against a
#     `[a-zA-Z_][\w-]*` regex (template codegen). See the "Codegen
#     safety contract" comments in:
#       packages/core/src/compiler/codegen.ts
#       packages/vite-plugin/src/routes.ts
#
#   - js/incomplete-html-sanitization: the framework's escape helpers
#     (`escHtml`, `escapeHtml`, `escapeHtmlLocal` and their `escAttr`
#     siblings) implement the OWASP five-character set (`& < > " '`).
#     The default suite's pattern matcher considers any escape function
#     "incomplete" unless it covers a specific superset; we've audited
#     and the five-char set is sufficient for both text and attribute
#     contexts in this codebase.
#
# All other queries from the default suite remain enabled.

name: Purity CodeQL config

query-filters:
  - exclude:
      id: js/code-injection
  - exclude:
      id: js/incomplete-html-sanitization
  - exclude:
      id: js/incomplete-multi-character-sanitization
