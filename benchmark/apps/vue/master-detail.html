<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Vue – Master-Detail</title>
  <link href="/css/currentStyle.css" rel="stylesheet" />
</head>
<body>
  <div id="main"><div class="container">
    <div class="jumbotron"><div class="row">
      <div class="col-md-6"><h1>Vue (Master-Detail)</h1></div>
      <div class="col-md-6"><div class="row">
        <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="populate">Load 100 Persons</button></div>

        <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="select-none">Deselect</button></div>

      </div></div>
    </div></div>
    <div id="app-container"></div>
  </div></div>
  <script type="module">
    import { createMasterDetailApp } from './master-detail.ts';
    createMasterDetailApp(
      document.getElementById('app-container'),
      document.getElementById('populate'),
      document.getElementById('select-first'),
      document.getElementById('select-last'),
      document.getElementById('select-none'),
      document.getElementById('cycle-10'),
    );
  </script>
</body>
</html>
