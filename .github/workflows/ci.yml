name: CI — Lint, Test, Build

# Runs automatically on every push to main and every PR.
# Verifies code quality, type safety, tests, and build integrity.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: Lint → Test → Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6

      - name: 🟢 Setup Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: 📦 Install root dependencies
        # Installs all workspace dependencies from lockfile
        run: npm ci

      - name: 🔍 Lint & format check (Biome)
        # Checks all files for formatting and lint errors without modifying them
        run: npx biome check .

      - name: 🔷 Type check @purity/core
        # Verifies TypeScript types compile without errors
        run: cd packages/core && npx tsc --noEmit

      - name: 🧪 Test @purity/core (155 tests)
        # Runs vitest on the core framework — signals, templates, components, control flow
        run: npm test -w packages/core

      - name: 🧪 Test @purity/vite-plugin (12 tests)
        # Runs vitest on the AOT template compiler plugin
        run: npm test -w packages/vite-plugin

      - name: 🏗️ Build @purity/core
        # Produces dist/ with ESM, CJS, and .d.ts type declarations
        run: npm run build -w packages/core

      - name: 🏗️ Build @purity/vite-plugin
        # Produces dist/ with the compiled plugin
        run: npm run build -w packages/vite-plugin

      - name: 🏗️ Build benchmark (verifies AOT compilation)
        # Runs vite build — proves the AOT plugin compiles html`` templates.
        # Benchmark is a workspace member so deps are already installed.
        run: cd benchmark && npx vite build
