<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Solid Benchmark</title>
  <link href="/css/currentStyle.css" rel="stylesheet" />
</head>
<body>
  <div id="main"><div class="container">
    <div class="jumbotron"><div class="row">
      <div class="col-md-6"><h1>Solid</h1></div>
      <div class="col-md-6"><div class="row">
        <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="run">Create 1,000 rows</button></div>
        <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="runlots">Create 10,000 rows</button></div>
        <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="add">Append 1,000 rows</button></div>
        <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="update">Update every 10th row</button></div>
        <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="clear">Clear</button></div>
        <div class="col-sm-6 smallpad"><button type="button" class="btn btn-primary btn-block" id="swaprows">Swap Rows</button></div>
        <button type="button" id="run-10" style="display:none">Create 10</button>
        <button type="button" id="run-100" style="display:none">Create 100</button>
        <button type="button" id="add-10" style="display:none">Append 10</button>
        <button type="button" id="add-100" style="display:none">Append 100</button>
        <button type="button" id="add-10k" style="display:none">Append 10,000</button>
      </div></div>
    </div></div>
    <table class="table table-hover table-striped test-data"><tbody id="tbody"></tbody></table>
  </div></div>
  <script type="module">
    import { createSolidApp } from './app.tsx';

    const app = createSolidApp(document.getElementById('tbody'));
    document.getElementById('run').addEventListener('click', () => app.run(1000));
    document.getElementById('runlots').addEventListener('click', () => app.run(10000));
    document.getElementById('add').addEventListener('click', () => app.add());
    document.getElementById('update').addEventListener('click', () => app.update());
    document.getElementById('clear').addEventListener('click', () => app.clear());
    document.getElementById('swaprows').addEventListener('click', () => app.swapRows());
    document.getElementById('run-10').addEventListener('click', () => app.run(10));
    document.getElementById('run-100').addEventListener('click', () => app.run(100));
    document.getElementById('add-10').addEventListener('click', () => app.add(10));
    document.getElementById('add-100').addEventListener('click', () => app.add(100));
    document.getElementById('add-10k').addEventListener('click', () => app.add(10000));
  </script>
</body>
</html>
