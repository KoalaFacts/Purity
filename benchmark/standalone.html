<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Purity Benchmark</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;padding:1rem;background:#f5f5f5}
    h1{color:#6c5ce7;margin-bottom:.25rem}
    .sub{color:#888;margin-bottom:1rem;font-size:.85rem}
    .ctrls{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem}
    button{padding:.5rem 1rem;border:none;border-radius:6px;background:#6c5ce7;color:white;cursor:pointer;font-size:.9rem}
    button:hover{background:#5a4bd1}
    button.d{background:#e17055}
    #res{background:white;border-radius:8px;padding:1rem;margin-bottom:1rem;font-family:monospace;white-space:pre-wrap;line-height:1.6;min-height:180px}
    table{width:100%;border-collapse:collapse;background:white}
    td{padding:.3rem .6rem;border-bottom:1px solid #eee;font-size:.85rem}
    tr.danger td{background:#ffe0d6}
    .remove{cursor:pointer;color:#e17055}
    .lbl{cursor:pointer;color:#333;text-decoration:none}
  </style>
</head>
<body>
  <h1>Purity Benchmark</h1>
  <p class="sub">All operations use Purity state() + watch() — real framework test</p>
  <div class="ctrls">
    <button type="button" onclick="benchOp('create 1k',()=>run(1000))">Create 1,000</button>
    <button type="button" onclick="benchOp('create 10k',()=>run(10000))">Create 10,000</button>
    <button type="button" onclick="benchOp('append 1k',add)">Append 1,000</button>
    <button type="button" onclick="benchOp('update 10th',update)">Update 10th</button>
    <button type="button" onclick="benchOp('swap',swapRows)">Swap</button>
    <button type="button" onclick="benchOp('select',()=>selectedId(items()[Math.floor(items().length/2)]?.id||1))">Select</button>
    <button type="button" onclick="benchOp('remove 1',()=>{const d=items();if(d.length)removeRow(d[0].id)})">Remove 1</button>
    <button type="button" onclick="benchOp('clear',clearAll)" class="d">Clear</button>
    <button type="button" onclick="runAll()">Run All</button>
  </div>
  <div id="res">Click "Run All" to benchmark.</div>
  <table><tbody id="tbody"></tbody></table>

  <script type="module">
    import { state, watch } from '../../packages/core/src/index.ts';

    const adj=['pretty','large','big','small','tall','short','long','handsome','plain','quaint','clean','elegant','easy','angry','crazy','helpful','mushy','odd','unsightly','adorable','important','inexpensive','cheap','expensive','fancy'];
    const col=['red','yellow','blue','green','pink','brown','purple','brown','white','black','orange'];
    const nou=['table','chair','house','bbq','desk','car','pony','cookie','sandwich','burger','pizza','mouse','keyboard'];
    let nid=1;
    const rnd=m=>(Math.random()*m)|0;
    const mkLabel=()=>`${adj[rnd(adj.length)]} ${col[rnd(col.length)]} ${nou[rnd(nou.length)]}`;
    const mkData=n=>{const d=new Array(n);for(let i=0;i<n;i++)d[i]={id:nid++,label:mkLabel()};return d;};

    // Purity signals
    const items = state([]);
    const selectedId = state(0);
    window.items = items;
    window.selectedId = selectedId;

    // Row cache
    const rowMap = new Map();
    function getOrCreate(item) {
      let r = rowMap.get(item.id);
      if (r) { if (r.l!==item.label){r.ln.data=item.label;r.l=item.label;} return r; }
      const tr=document.createElement('tr');
      const t1=document.createElement('td');t1.textContent=item.id;
      const t2=document.createElement('td');const a=document.createElement('a');a.className='lbl';
      const ln=document.createTextNode(item.label);a.appendChild(ln);t2.appendChild(a);
      const t3=document.createElement('td');const a2=document.createElement('a');a2.className='remove';a2.textContent='x';t3.appendChild(a2);
      const t4=document.createElement('td');
      tr.appendChild(t1);tr.appendChild(t2);tr.appendChild(t3);tr.appendChild(t4);
      r={tr,ln,l:item.label};rowMap.set(item.id,r);return r;
    }

    // Actions
    window.run=n=>{rowMap.clear();items(mkData(n));selectedId(0);};
    window.add=()=>items(d=>d.concat(mkData(1000)));
    window.update=()=>items(d=>{const c=d.slice();for(let i=0;i<c.length;i+=10)c[i]={...c[i],label:`${c[i].label} !!!`};return c;});
    window.clearAll=()=>{rowMap.clear();items([]);selectedId(0);};
    window.swapRows=()=>items(d=>{if(d.length>998){const c=d.slice();const t=c[1];c[1]=c[998];c[998]=t;return c;}return d;});
    window.removeRow=id=>{const r=rowMap.get(id);if(r?.tr.parentNode)r.tr.parentNode.removeChild(r.tr);rowMap.delete(id);items(d=>d.filter(x=>x.id!==id));};

    // Keyed reconciliation via watch()
    const tbody=document.getElementById('tbody');
    let prevIds=[];

    watch(()=>{
      const list=items(), sel=selectedId(), len=list.length;
      const newIds=new Array(len), active=new Set();

      for(let i=0;i<len;i++){
        const it=list[i]; newIds[i]=it.id; active.add(it.id);
        const r=getOrCreate(it); r.tr.className=it.id===sel?'danger':'';
      }

      // Remove old
      for(let i=0;i<prevIds.length;i++){
        const id=prevIds[i];
        if(!active.has(id)){const r=rowMap.get(id);if(r?.tr.parentNode)r.tr.parentNode.removeChild(r.tr);rowMap.delete(id);}
      }

      // Check if order changed
      let same=len===prevIds.length;
      if(same)for(let i=0;i<len;i++)if(prevIds[i]!==newIds[i]){same=false;break;}
      if(same){prevIds=newIds;return;}

      // Detect append
      let app=len>prevIds.length;
      if(app)for(let i=0;i<prevIds.length;i++)if(prevIds[i]!==newIds[i]){app=false;break;}

      if(app&&prevIds.length>0){
        const f=document.createDocumentFragment();
        for(let i=prevIds.length;i<len;i++)f.appendChild(rowMap.get(newIds[i]).tr);
        tbody.appendChild(f);
      } else {
        const f=document.createDocumentFragment();
        for(let i=0;i<len;i++)f.appendChild(rowMap.get(newIds[i]).tr);
        while(tbody.firstChild)tbody.removeChild(tbody.firstChild);
        tbody.appendChild(f);
      }
      prevIds=newIds;
    });

    // Events
    tbody.addEventListener('click',e=>{const a=e.target.closest('a');if(!a)return;e.preventDefault();const id=+a.closest('tr').id;if(a.classList.contains('lbl'))selectedId(id);else if(a.classList.contains('remove'))removeRow(id);});

    // Bench harness
    const res=document.getElementById('res');
    window.benchOp=(name,fn)=>{document.body.offsetHeight;const s=performance.now();fn();document.body.offsetHeight;const e=performance.now()-s;res.textContent+=`${name}: ${e.toFixed(2)}ms\n`;};
    const sleep=ms=>new Promise(r=>setTimeout(r,ms));
    window.runAll=async()=>{
      res.textContent='Running (Purity state + watch)...\n\n';
      benchOp('create 1,000 rows',()=>run(1000)); await sleep(200);
      benchOp('replace 1,000 rows',()=>run(1000)); await sleep(200);
      benchOp('update every 10th',update); await sleep(200);
      benchOp('select row',()=>selectedId(items()[0]?.id)); await sleep(200);
      benchOp('swap rows',swapRows); await sleep(200);
      benchOp('remove row',()=>removeRow(items()[0]?.id)); await sleep(200);
      benchOp('clear',clearAll); await sleep(200);
      benchOp('create 10,000 rows',()=>run(10000)); await sleep(500);
      benchOp('clear 10,000',clearAll); await sleep(200);
      run(1000); await sleep(200);
      benchOp('append 1,000 to 1,000',add); await sleep(200);
      benchOp('clear 2,000',clearAll);
      res.textContent+=`\n✓ All operations used Purity state() + watch()\n`;
      res.textContent+=`✓ Keyed reconciliation — rows reused by id\n`;
      res.textContent+=`✓ Fast paths: same-order skip, append detection\n`;
    };
  </script>
</body>
</html>
