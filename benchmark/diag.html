<!DOCTYPE html>
<html>
<head><title>Purity Diagnostic</title></head>
<body>
  <div id="status">starting...</div>
  <table><tbody id="tbody"></tbody></table>
  <script type="module">
    import { state, watch } from '../packages/core/src/index.ts';

    const statusEl = document.getElementById('status');
    const log = (msg) => { statusEl.textContent += '\n' + msg; console.log(msg); };

    function tick() { return new Promise(r => queueMicrotask(r)); }

    const adj=['pretty','large','big','small','tall'];
    const col=['red','yellow','blue','green','pink'];
    const nou=['table','chair','house','desk','car'];
    let nid=1;
    const rnd=m=>(Math.random()*m)|0;
    const mkLabel=()=>`${adj[rnd(5)]} ${col[rnd(5)]} ${nou[rnd(5)]}`;
    const mkData=n=>{const d=new Array(n);for(let i=0;i<n;i++)d[i]={id:nid++,label:mkLabel()};return d;};

    const data = state([]);
    const sel = state(0);
    const rowMap = new Map();
    const tbody = document.getElementById('tbody');
    let prevIds = [];

    function getOrCreate(item) {
      let r = rowMap.get(item.id);
      if (r) { if(r.l!==item.label){r.ln.data=item.label;r.l=item.label;} return r; }
      const tr=document.createElement('tr');
      const t1=document.createElement('td');t1.textContent=item.id;
      const t2=document.createElement('td');t2.textContent=item.label;
      tr.appendChild(t1);tr.appendChild(t2);
      r={tr,ln:null,l:item.label};rowMap.set(item.id,r);return r;
    }

    watch(()=>{
      const list=data(), s=sel(), len=list.length;
      const newIds=new Array(len), active=new Set();
      for(let i=0;i<len;i++){
        const it=list[i];newIds[i]=it.id;active.add(it.id);
        const r=getOrCreate(it);r.tr.className=it.id===s?'danger':'';
      }
      for(let i=0;i<prevIds.length;i++){
        const id=prevIds[i];
        if(!active.has(id)){const r=rowMap.get(id);if(r&&r.tr.parentNode)r.tr.parentNode.removeChild(r.tr);rowMap.delete(id);}
      }
      if(len===prevIds.length){
        let same=true;
        for(let i=0;i<len;i++)if(prevIds[i]!==newIds[i]){same=false;break;}
        if(same){prevIds=newIds;return;}
      }
      const f=document.createDocumentFragment();
      for(let i=0;i<len;i++)f.appendChild(rowMap.get(newIds[i]).tr);
      while(tbody.firstChild)tbody.removeChild(tbody.firstChild);
      tbody.appendChild(f);
      prevIds=newIds;
    });

    log('watch set up');

    // Test 1: Create 1000 rows
    try {
      log('test1: create 1k...');
      rowMap.clear(); data(mkData(1000)); sel(0);
      await tick();
      document.body.offsetHeight;
      log(`test1 OK: tbody has ${tbody.children.length} rows, rowMap has ${rowMap.size} entries`);
    } catch(e) { log(`test1 FAIL: ${e.message}`); }

    // Test 2: Replace 1000 rows
    try {
      log('test2: replace 1k...');
      rowMap.clear(); data(mkData(1000)); sel(0);
      await tick();
      document.body.offsetHeight;
      log(`test2 OK: tbody has ${tbody.children.length} rows, rowMap has ${rowMap.size} entries`);
    } catch(e) { log(`test2 FAIL: ${e.message}`); }

    // Test 3: Clear
    try {
      log('test3: clear...');
      rowMap.clear(); data([]); sel(0);
      await tick();
      document.body.offsetHeight;
      log(`test3 OK: tbody has ${tbody.children.length} rows`);
    } catch(e) { log(`test3 FAIL: ${e.message}`); }

    // Test 4: Create then replace (the real scenario)
    try {
      log('test4: create then replace...');
      rowMap.clear(); nid=1; data(mkData(1000)); sel(0);
      await tick();
      document.body.offsetHeight;
      log(`test4a: ${tbody.children.length} rows (should be 1000)`);

      rowMap.clear(); data(mkData(1000)); sel(0);
      await tick();
      document.body.offsetHeight;
      log(`test4b: ${tbody.children.length} rows (should be 1000)`);
    } catch(e) { log(`test4 FAIL: ${e.message}\n${e.stack}`); }

    // Test 5: timed create 1k
    try {
      log('test5: timed create 1k...');
      rowMap.clear(); data([]); sel(0);
      await tick();
      document.body.offsetHeight;

      const start = performance.now();
      rowMap.clear(); nid=1; data(mkData(1000)); sel(0);
      await tick();
      document.body.offsetHeight;
      const elapsed = performance.now() - start;
      log(`test5 OK: ${elapsed.toFixed(1)}ms for 1000 rows (${tbody.children.length} in DOM)`);
    } catch(e) { log(`test5 FAIL: ${e.message}`); }

    log('\nDONE');
  </script>
</body>
</html>
