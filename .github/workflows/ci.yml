name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx biome check .

      - name: Type check (core)
        run: cd packages/core && npx tsc --noEmit

      - name: Test core
        run: npm test -w packages/core

      - name: Test vite-plugin
        run: npm test -w packages/vite-plugin

      - name: Build core
        run: npm run build -w packages/core

      - name: Build vite-plugin
        run: npm run build -w packages/vite-plugin

      - name: Build benchmark (verifies AOT compilation)
        run: cd benchmark && npm ci && npx vite build
