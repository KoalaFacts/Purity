<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Purity Auto-Benchmark</title></head>
<body>
  <pre id="output">Starting...</pre>
  <div id="app"><table><tbody id="tbody"></tbody></table></div>
  <script type="module">
    // Guard against Vite HMR double-execution
    if (window.__benchRunning) throw new Error('duplicate');
    window.__benchRunning = true;

    import { state, watch } from '../packages/core/src/index.ts';

    const WARMUP = 2, ITERATIONS = 7, DISCARD = 1;
    const out = document.getElementById('output');
    out.textContent = '';
    const log = msg => { out.textContent += `\n${msg}`; console.log(msg); };

    function tick() { return new Promise(r => queueMicrotask(r)); }
    async function flush() { await tick(); document.body.offsetHeight; }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function calcStats(times) {
      const sorted = [...times].sort((a, b) => a - b);
      const trimmed = sorted.slice(0, sorted.length - DISCARD);
      const n = trimmed.length;
      const mean = trimmed.reduce((a, b) => a + b, 0) / n;
      const median = n % 2 === 0 ? (trimmed[n/2-1]+trimmed[n/2])/2 : trimmed[Math.floor(n/2)];
      const variance = trimmed.reduce((a, b) => a + (b - mean) ** 2, 0) / n;
      return { mean, median, stddev: Math.sqrt(variance), min: trimmed[0], max: trimmed[n-1], n };
    }

    async function bench(setup, run, teardown) {
      const times = [];
      for (let i = 0; i < WARMUP; i++) {
        if (setup) setup(); await flush();
        run(); await flush();
        if (teardown) teardown(); await flush();
        await sleep(20);
      }
      for (let i = 0; i < ITERATIONS; i++) {
        if (setup) setup(); await flush(); await sleep(5);
        const t0 = performance.now();
        run();
        await flush();
        times.push(performance.now() - t0);
        if (teardown) teardown(); await flush();
        await sleep(20);
      }
      return calcStats(times);
    }

    // Data gen
    const adj=['pretty','large','big','small','tall','short','long','handsome','plain','quaint','clean','elegant','easy','angry','crazy','helpful','mushy','odd','unsightly','adorable','important','inexpensive','cheap','expensive','fancy'];
    const col=['red','yellow','blue','green','pink','brown','purple','brown','white','black','orange'];
    const nou=['table','chair','house','bbq','desk','car','pony','cookie','sandwich','burger','pizza','mouse','keyboard'];
    let nid = 1;
    const rnd = m => (Math.random()*m)|0;
    const mkLabel = () => `${adj[rnd(adj.length)]} ${col[rnd(col.length)]} ${nou[rnd(nou.length)]}`;
    function mkData(n) { const d = new Array(n); for (let i=0;i<n;i++) d[i]={id:nid++,label:mkLabel()}; return d; }

    // Signals
    const data = state([]);
    const sel = state(0);
    const rowMap = new Map();
    const tbody = document.getElementById('tbody');
    let prevIds = [];

    function getOrCreate(item) {
      let r = rowMap.get(item.id);
      if (r) { if(r.l!==item.label){r.ln.data=item.label;r.l=item.label;} return r; }
      const tr=document.createElement('tr');
      const t1=document.createElement('td');t1.textContent=item.id;
      const t2=document.createElement('td');const a=document.createElement('a');a.className='lbl';
      const ln=document.createTextNode(item.label);a.appendChild(ln);t2.appendChild(a);
      const t3=document.createElement('td');const a2=document.createElement('a');a2.className='remove';a2.textContent='\u00d7';t3.appendChild(a2);
      const t4=document.createElement('td');
      tr.appendChild(t1);tr.appendChild(t2);tr.appendChild(t3);tr.appendChild(t4);
      r={tr,ln,l:item.label};rowMap.set(item.id,r);return r;
    }

    watch(() => {
      const list = data(), s = sel();
      if (!Array.isArray(list)) { console.error('data() is not array:', typeof list, list); return; }
      const len = list.length;
      const newIds = new Array(len), active = new Set();

      for (let i = 0; i < len; i++) {
        const it = list[i];
        newIds[i] = it.id;
        active.add(it.id);
        const r = getOrCreate(it);
        r.tr.className = it.id === s ? 'danger' : '';
      }

      // Remove stale rows from DOM and rowMap
      for (let i = 0; i < prevIds.length; i++) {
        const id = prevIds[i];
        if (!active.has(id)) {
          const r = rowMap.get(id);
          if (r) {
            if (r.tr.parentNode) r.tr.parentNode.removeChild(r.tr);
            rowMap.delete(id);
          }
        }
      }

      // Check if order unchanged — skip DOM work
      let same = len === prevIds.length;
      if (same) {
        for (let i = 0; i < len; i++) if (prevIds[i] !== newIds[i]) { same = false; break; }
      }
      if (same) { prevIds = newIds; return; }

      // Check pure append
      let isAppend = len > prevIds.length;
      if (isAppend) {
        for (let i = 0; i < prevIds.length; i++) if (prevIds[i] !== newIds[i]) { isAppend = false; break; }
      }

      if (isAppend && prevIds.length > 0) {
        const f = document.createDocumentFragment();
        for (let i = prevIds.length; i < len; i++) f.appendChild(rowMap.get(newIds[i]).tr);
        tbody.appendChild(f);
      } else {
        // Full rebuild
        const f = document.createDocumentFragment();
        for (let i = 0; i < len; i++) f.appendChild(rowMap.get(newIds[i]).tr);
        while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
        tbody.appendChild(f);
      }
      prevIds = newIds;
    });

    // Ops — NO rowMap.clear() here! The watch manages the cache.
    const ops = {
      create1k:   () => { data(mkData(1000)); sel(0); },
      create10k:  () => { data(mkData(10000)); sel(0); },
      append1k:   () => data(d => d.concat(mkData(1000))),
      update10th: () => data(d => {
        const c = d.slice();
        for (let i = 0; i < c.length; i += 10) c[i] = { ...c[i], label: c[i].label + ' !!!' };
        return c;
      }),
      selectRow: () => { const d = data(); if (d.length > 0) sel(d[Math.floor(d.length / 2)].id); },
      swapRows:  () => data(d => {
        if (d.length > 998) { const c = d.slice(); const t = c[1]; c[1] = c[998]; c[998] = t; return c; }
        return d;
      }),
      removeRow: () => {
        const d = data();
        if (d.length > 0) {
          const id = d[0].id;
          data(dd => dd.filter(x => x.id !== id));
        }
      },
      clearAll: () => { data([]); sel(0); },
    };
    const clear    = () => { nid = 1; data([]); sel(0); };
    const create1k = () => { nid = 1; data(mkData(1000)); sel(0); };

    // Expose for external orchestration
    window.__benchFns = { bench, flush, sleep, ops, clear, create1k };

    // Run
    const suite = [
      ['Create 1,000 rows',     clear,                         ops.create1k,  null ],
      ['Replace 1,000 rows',    ()=>{clear();create1k();},     ops.create1k,  null ],
      ['Update every 10th row', create1k,                      ops.update10th,clear],
      ['Select row',            create1k,                      ops.selectRow, clear],
      ['Swap rows',             create1k,                      ops.swapRows,  clear],
      ['Remove row',            create1k,                      ops.removeRow, clear],
      ['Clear 1,000 rows',      create1k,                      ops.clearAll,  null ],
      ['Create 10,000 rows',    clear,                         ops.create10k, null ],
      ['Clear 10,000 rows',     null,                          ops.clearAll,  null ],
      ['Append 1,000 rows',     create1k,                      ops.append1k,  clear],
    ];

    log(`Purity Benchmark (warmup=${WARMUP}, iter=${ITERATIONS}, discard=${DISCARD})`);
    log('');

    const pad = (s, w) => (`${s}`).padEnd(w);
    log(`${pad('Operation',28)} ${pad('Median',10)} ${pad('Mean',10)} ${pad('\u03c3',10)} ${pad('Min',10)} ${pad('Max',10)}`);
    log('-'.repeat(78));

    const jsonResults = [];

    for (const [name, setup, run, teardown] of suite) {
      // Let GC run between operations
      await sleep(200);
      try {
        const s = await bench(setup, run, teardown);
        log(`${pad(name,28)} ${pad(`${s.median.toFixed(1)}ms`,10)} ${pad(`${s.mean.toFixed(1)}ms`,10)} ${pad(`${s.stddev.toFixed(1)}ms`,10)} ${pad(`${s.min.toFixed(1)}ms`,10)} ${pad(`${s.max.toFixed(1)}ms`,10)}`);
        jsonResults.push({name,...s});
      } catch(e) {
        log(`${pad(name,28)} FAILED: ${e.message}`);
      }
    }

    log('');
    log('BENCHMARK_COMPLETE');

    // Store results for Playwright to read
    window.__benchResults = jsonResults;
  </script>
</body>
</html>
